name: maffa

version: '3.8'

services:
  db:
    container_name: maffa-db
    image: postgres:14
    environment:
      POSTGRES_USER: defaultdb
      POSTGRES_PASSWORD: password
      POSTGRES_DB: defaultdb
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - ./maffa-db:/docker-entrypoint-initdb.d
    restart: unless-stopped
